<div class="login-wrapper">

  <div class="login-box">

    <!-- Logo / Titre -->
    <div class="login-header">
      <div class="login-logo">
        <i class="pi pi-chart-network" style="font-size: 2.5rem; color: var(--p-primary-color)"></i>
      </div>
      <h1 class="login-title">SDIA</h1>
      <p class="login-subtitle">Smart Dependency Impact Analyzer</p>
    </div>

    <!-- Carte de login -->
    <p-card styleClass="login-card">

      <div class="login-form">

        <!-- Message d'erreur -->
        @if (errorMessage) {
          <p-message severity="error" [text]="errorMessage" styleClass="w-full mb-3" />
        }

        <!-- Username -->
        <div class="field">
          <label for="username">Nom d'utilisateur</label>
          <input
            pInputText
            id="username"
            [(ngModel)]="username"
            placeholder="Entrez votre nom d'utilisateur"
            class="w-full"
            (keyup.enter)="login()"
          />
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Mot de passe</label>
          <p-password
            id="password"
            [(ngModel)]="password"
            placeholder="Entrez votre mot de passe"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            (keyup.enter)="login()"
          />
        </div>

        <!-- Bouton -->
        <p-button
          label="Se connecter"
          icon="pi pi-sign-in"
          styleClass="w-full mt-2"
          [loading]="loading"
          (onClick)="login()"
        />

      </div>

    </p-card>

    <p class="login-footer">
      NTT Data © 2024 — Administration
    </p>

  </div>

</div>
